<!DOCTYPE html>
<html>
<head>
    <title>Удаление дела</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #dc3545; margin-bottom: 15px; }
        p { color: #555; margin-bottom: 20px; }
        .buttons { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; }
        .btn-secondary { background: #6c757d; color: white; text-decoration: none; }
        .btn-secondary:hover { background: #5a6268; }
        .nav { background: white; padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; }
        .nav a { color: #667eea; text-decoration: none; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="{% url 'tasks:list' %}">← Назад к списку</a>
        </div>
        
        <div class="card">
            <h1>🗑️ Удалить дело?</h1>
            <p>Вы уверены, что хотите удалить дело <strong>"{{ task.title }}"</strong>?</p>
            <p style="font-size: 14px; color: #888;">Это действие нельзя отменить.</p>
            
            <div class="buttons">
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                </form>
                <a href="{% url 'tasks:list' %}" class="btn btn-secondary">Отмена</a>
            </div>
        </div>
    </div>
</body>
</html>
