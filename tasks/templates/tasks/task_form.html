<!DOCTYPE html>
<html>
<head>
    <title>{{ action }} дело</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        input:focus, textarea:focus, select:focus { border-color: #667eea; outline: none; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: #667eea; color: white; }
        .btn-primary:hover { background: #5a67d8; }
        .btn-secondary { background: #6c757d; color: white; text-decoration: none; display: inline-block; }
        .btn-secondary:hover { background: #5a6268; }
        .buttons { display: flex; gap: 10px; margin-top: 20px; }
        .nav { background: white; padding: 15px 25px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav a { color: #667eea; text-decoration: none; margin-right: 20px; }
        .nav a:hover { text-decoration: underline; }
        .messages { padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .messages.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="{% url 'tasks:list' %}">← Назад к списку</a>
        </div>
        
        <div class="card">
            <h1>{{ action }} дело</h1>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="messages {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="id_title">Наименование *</label>
                    {{ form.title }}
                </div>
                
                <div class="form-group">
                    <label for="id_description">Примечание</label>
                    {{ form.description }}
                </div>
                
                <div class="form-group">
                    <label for="id_due_date">Дата выполнения</label>
                    {{ form.due_date }}
                </div>
                
                <div class="form-group">
                    <label for="id_status">Статус</label>
                    {{ form.status }}
                </div>
                
                <div class="buttons">
                    <button type="submit" class="btn btn-primary">💾 Сохранить</button>
                    <a href="{% url 'tasks:list' %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
